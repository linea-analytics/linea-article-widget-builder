<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget Test — optim-widget</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <style>
    body { background: #f9fafb; }
    .test-header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 0;
      margin-bottom: 32px;
    }
    .test-badge {
      display: inline-block;
      background: #dcfce7;
      color: #15803d;
      font-size: 0.7rem;
      font-weight: 600;
      border-radius: 999px;
      padding: 2px 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      vertical-align: middle;
    }
    #widget-status {
      font-size: 0.78rem;
      color: #6b7280;
      margin-top: 8px;
    }
    #widget-status.error { color: #dc2626; }
  </style>
</head>
<body>

  <div class="test-header">
    <div class="container">
      <span class="test-badge">Widget Testbed</span>
      <span class="ms-2 fw-semibold">optim-widget.html</span>
      <p id="widget-status">Loading widget…</p>
    </div>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-11">

        <!-- Widget mounts here, same as in articles -->
        <div id="optim-widget"></div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    (async function loadWidget() {
      const container = document.getElementById('optim-widget');
      const status    = document.getElementById('widget-status');

      try {
        const res = await fetch('./optim-widget.html');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const html = await res.text();

        const tmp = document.createElement('div');
        tmp.innerHTML = html;

        // Append non-script nodes first, then execute scripts in order
        const scripts = [];
        tmp.childNodes.forEach(node => {
          if (node.nodeName === 'SCRIPT') {
            scripts.push(node.textContent);
          } else {
            container.appendChild(node.cloneNode(true));
          }
        });

        scripts.forEach(src => {
          const s = document.createElement('script');
          s.textContent = src;
          document.body.appendChild(s);
        });

        status.textContent = `Loaded from ./optim-widget.html`;
      } catch (err) {
        status.textContent = `Error: ${err.message} — serve this page over HTTP (e.g. VS Code Live Server)`;
        status.classList.add('error');
        container.innerHTML = `<div class="alert alert-danger">Could not load widget: ${err.message}</div>`;
      }
    })();
  </script>

</body>
</html>
